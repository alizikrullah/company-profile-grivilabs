<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ─── Primary Meta ─── -->
    <title>GriviLabs · Custom Web Development untuk UMKM Indonesia</title>
    <meta
      name="description"
      content="GriviLabs adalah tech studio yang membangun website bisnis dari nol menggunakan custom code, bukan template WordPress. Lebih cepat, lebih aman, dan siap tumbuh bersama bisnis Anda."
    />
    <meta name="theme-color" content="#0d1117" />
    <link rel="canonical" href="https://grivilabs.com/" />

    <!-- ─── Open Graph ─── -->
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="https://grivilabs.com/" />
    <meta property="og:title"       content="GriviLabs · Custom Web Development untuk UMKM Indonesia" />
    <meta
      property="og:description"
      content="Tech studio yang membangun website bisnis dari nol. No templates. Just results."
    />
    <meta property="og:image"       content="https://grivilabs.com/og-image.png" />
    <meta property="og:locale"      content="id_ID" />
    <meta property="og:site_name"   content="GriviLabs" />

    <!-- ─── Twitter Card ─── -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="GriviLabs · Custom Web Development" />
    <meta
      name="twitter:description"
      content="Tech studio yang membangun website bisnis dari nol. No templates. Just results."
    />
    <meta name="twitter:image"       content="https://grivilabs.com/og-image.png" />

    <!-- ─── Favicon ─── -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- ─── Font Preconnect ─── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- ─── Font Load Async (tidak blocking render) ─── -->
    <link
      rel="preload"
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Inter:wght@400;500;700&display=swap"
      as="style"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Inter:wght@400;500;700&display=swap"
        rel="stylesheet"
      />
    </noscript>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
